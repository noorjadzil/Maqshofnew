<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper Web</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#1e1e1e;
    color:white;
}

h1{
    margin-top:10px;
}

#board{
    margin:auto;
    display:grid;
    grid-template-columns: repeat(10,40px);
    grid-template-rows: repeat(10,40px);
    gap:2px;
    width:max-content;
}

.cell{
    width:40px;
    height:40px;
    background:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
}

.open{
    background:#ddd;
    color:black;
}

.bomb{
    background:red;
}

button{
    margin:10px;
    padding:8px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1>Minesweeper</h1>
<button onclick="startGame()">Restart</button>
<div id="board"></div>

<script>

const size = 10
const bombsCount = 15

let board=[]
let bombs=[]
let gameOver=false

function startGame(){

    const boardDiv=document.getElementById("board")
    boardDiv.innerHTML=""
    board=[]
    bombs=[]
    gameOver=false

    for(let i=0;i<size;i++){
        board[i]=[]
        for(let j=0;j<size;j++){

            let cell=document.createElement("div")
            cell.className="cell"
            cell.dataset.x=i
            cell.dataset.y=j

            cell.onclick=openCell
            cell.oncontextmenu=flagCell

            boardDiv.appendChild(cell)

            board[i][j]={
                bomb:false,
                open:false,
                flag:false,
                element:cell
            }
        }
    }

    placeBombs()
}

function placeBombs(){

    while(bombs.length<bombsCount){

        let x=Math.floor(Math.random()*size)
        let y=Math.floor(Math.random()*size)

        if(!board[x][y].bomb){
            board[x][y].bomb=true
            bombs.push([x,y])
        }
    }
}

function openCell(e){

    if(gameOver) return

    let x=parseInt(this.dataset.x)
    let y=parseInt(this.dataset.y)

    let cell=board[x][y]

    if(cell.open || cell.flag) return

    cell.open=true
    this.classList.add("open")

    if(cell.bomb){

        this.innerHTML="💣"
        this.classList.add("bomb")
        endGame(false)
        return
    }

    let count=countBombs(x,y)

    if(count>0){
        this.innerText=count
    }else{
        openAround(x,y)
    }

    checkWin()
}

function countBombs(x,y){

    let total=0

    for(let i=-1;i<=1;i++){
        for(let j=-1;j<=1;j++){

            let nx=x+i
            let ny=y+j

            if(nx>=0 && ny>=0 && nx<size && ny<size){
                if(board[nx][ny].bomb) total++
            }
        }
    }

    return total
}

function openAround(x,y){

    for(let i=-1;i<=1;i++){
        for(let j=-1;j<=1;j++){

            let nx=x+i
            let ny=y+j

            if(nx>=0 && ny>=0 && nx<size && ny<size){

                if(!board[nx][ny].open){
                    board[nx][ny].element.click()
                }

            }
        }
    }
}

function flagCell(e){

    e.preventDefault()

    if(gameOver) return

    let x=parseInt(this.dataset.x)
    let y=parseInt(this.dataset.y)

    let cell=board[x][y]

    if(cell.open) return

    cell.flag=!cell.flag
    this.innerHTML=cell.flag ? "🚩" : ""
}

function endGame(win){

    gameOver=true

    bombs.forEach(b=>{
        let cell=board[b[0]][b[1]]
        cell.element.innerHTML="💣"
        cell.element.classList.add("bomb")
    })

    setTimeout(()=>{
        alert(win ? "Kamu Menang!" : "Game Over")
    },200)
}

function checkWin(){

    let opened=0

    for(let i=0;i<size;i++){
        for(let j=0;j<size;j++){
            if(board[i][j].open) opened++
        }
    }

    if(opened === size*size - bombsCount){
        endGame(true)
    }
}

startGame()

</script>

</body>
</html>

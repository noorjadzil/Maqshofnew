<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a8a">
<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1e3a8a;
}

.laporan-card{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.laporan-header{
font-size:18px;
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
}

.laporan-tanggal{
display:inline-block;
background:#e0edff;
color:#1e3a8a;
padding:4px 10px;
border-radius:8px;
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

.laporan-items{
margin-top:6px;
line-height:1.5;
font-weight:600;
}

img{
width:100%;
border-radius:10px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Laporan Jajan</h2>

<div id="listLaporan">Loading...</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyAIEhd42LiAEu7CzsnTXubQdxH1dzu1nyQ",
authDomain:"cilok-86ced.firebaseapp.com",
databaseURL:"https://cilok-86ced-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"cilok-86ced",
storageBucket:"cilok-86ced.firebasestorage.app",
messagingSenderId:"1038629771281",
appId:"1:1038629771281:web:45d56ba73acaf6613a79b0"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// FORMAT TANGGAL
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

// LOAD LAPORAN
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

let arr=Object.values(snap.val()).reverse();

arr.forEach(d=>{

let items = (d.items || [])
.map(i=>`• ${i.barang} (${i.jumlah})`)
.join("<br>");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">${d.jenis} - ${d.tempat}</div>
<div class="laporan-tanggal">${formatTanggal(d.waktu)}</div>
<div class="laporan-items">${items}</div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>
` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);

});

});

}

loadLaporan();
</script>

</body>
</html>
